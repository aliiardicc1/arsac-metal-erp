name: EXE Build ve Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bagimlilikları yukle
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller requests reportlab

      - name: Surum numarasini guncelle
        shell: python
        run: |
          import re, os
          tag = os.environ.get("GITHUB_REF_NAME", "v1.0.0")
          surum = tag.lstrip("v")
          with open("updater.py", "r", encoding="utf-8") as f:
              content = f.read()
          content = re.sub(r'SURUM\s*=\s*"[\d.]+"', f'SURUM         = "{surum}"', content)
          with open("updater.py", "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Surum: {surum}")

      - name: EXE olustur
        run: |
          pyinstaller --onefile --windowed --name ArsacMetalERP main.py

      - name: Release olustur ve EXE yukle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Arsac Metal ERP ${{ github.ref_name }}"
          body: |
            ## Arsac Metal ERP ${{ github.ref_name }}
            EXE dosyasını indirip eski sürümün üzerine kopyalayın.
          files: dist/ArsacMetalERP.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
