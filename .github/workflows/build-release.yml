name: EXE Build ve Release

on:
  push:
    tags:
      - 'v*'        # v1.0.1, v1.0.2 gibi tag'larda tetiklenir

jobs:
  build:
    runs-on: windows-latest   # Windows EXE için Windows runner

    steps:
      # 1. Kodu çek
      - name: Kodu indir
        uses: actions/checkout@v4

      # 2. Python kur
      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Bağımlılıkları yükle
      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller requests reportlab

      # 4. Sürüm numarasını güncelle (tag'dan al)
      - name: Sürüm numarasını güncelle
        shell: python
        run: |
          import re, os
          tag = os.environ.get("GITHUB_REF_NAME", "v1.0.0")
          surum = tag.lstrip("v")
          with open("updater.py", "r", encoding="utf-8") as f:
              content = f.read()
          content = re.sub(
              r'SURUM\s*=\s*"[\d.]+"',
              f'SURUM         = "{surum}"',
              content)
          with open("updater.py", "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Sürüm güncellendi: {surum}")

      # 5. PyInstaller ile EXE üret
      - name: EXE oluştur
        run: |
          pyinstaller ArsacMetalERP.spec --clean --noconfirm
        # spec dosyası yoksa aşağıdaki komutu kullanın:
        # pyinstaller --onefile --windowed --name ArsacMetalERP --icon arsac.ico main.py

      # 6. EXE'yi yeniden adlandır
      - name: EXE hazırla
        run: |
          copy dist\ArsacMetalERP.exe ArsacMetalERP.exe

      # 7. GitHub Release oluştur ve EXE'yi yükle
      - name: Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Arsac Metal ERP ${{ github.ref_name }}"
          body: |
            ## Arsac Metal ERP ${{ github.ref_name }}

            ### Kurulum
            1. `ArsacMetalERP.exe` dosyasını indirin
            2. Eski EXE'nin üzerine kopyalayın
            3. Programı başlatın

            ### Değişiklikler
            ${{ github.event.head_commit.message }}
          files: ArsacMetalERP.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
